name: QuartiCal CI Workflow

# Specific github action events that you can lookup in their API
on:
  push:
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    continue-on-error: true

    env:
      NUMBA_CACHE_DIR: /tmp/numba-cache

    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Checkout the source code
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full fetch required to restore times.

      - name: Restore repo times
        uses: chetan/git-restore-mtime-action@v2

      # Upgrade pip and setuptools
      - name: Upgrade pip and setuptools
        run: python -m pip install -U pip setuptools

      - name: Create Key and Numba Cache Directory
        id: numba-key
        run: |
          mkdir -p ${{ env.NUMBA_CACHE_DIR }}
          echo "timestamp=$(/bin/date -u '+%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Cache Numba Kernels
        uses: actions/cache@v5
        with:
          key: numba-cache-${{ matrix.python-version }}-${{ steps.numba-key.outputs.timestamp }}
          restore-keys: numba-cache-${{ matrix.python-version }}-
          path: ${{ env.NUMBA_CACHE_DIR }}

      - name: List the measures directory
        run: curl --disable-epsv  ftp://ftp.astron.nl/outgoing/Measures/ > measures_dir.txt

      - name: Load cached CASA Measures Data
        id: load-cached-casa-measures
        uses: actions/cache@v5
        with:
          key: casa-measures-${{ hashFiles('measures_dir.txt')}}
          path: |
            ~/measures
            ~/.casarc

      - name: Download and install CASA Measures Data
        if: steps.load-cached-casa-measures.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/measures
          curl --disable-epsv ftp://ftp.astron.nl/outgoing/Measures/WSRT_Measures.ztar | tar xvzf - -C ~/measures
          echo "measures.directory: ~/measures" > ~/.casarc

      # Install the package via pip. This deliberately mimics a user
      # install (pip install .) rather than a uv sync from source, as the
      # former is how the vast majority of users will install QuartiCal.
      - name: Install QuartiCal
        run: python -m pip install .

      # Install the test tooling from the dev dependency group. Requires
      # pip >= 25.1 for --group support, which the upgrade step above ensures.
      - name: Install test dependencies
        run: python -m pip install --group dev

      # Check that the help prints, suggesting that everything is ok.
      - name: Run QuartiCal
        run: goquartical

      # Run the test cases
      - name: Testing Step
        run: pytest -v testing/tests

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    # Run on tagged push (generated by tbump).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Build distributions
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Publish distribution to Test PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI }}
          repository_url: https://test.pypi.org/legacy/
        continue-on-error: true

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          user: __token__
          password: ${{ secrets.PYPI }}

  release:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Release
        uses: softprops/action-gh-release@v3.0.1
